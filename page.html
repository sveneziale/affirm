<!DOCTYPE html>
<html>
<head>
    <title>My Sage Tutorial</title>
    <script src="https://sagecell.sagemath.org/static/embedded_sagecell.js"></script>
    <script>
        sagecell.makeSagecell({
            inputLocation: '.sage-cell',
            evalButtonText: 'Run'
        });
    </script>
    <link rel="stylesheet" href="https://sagecell.sagemath.org/static/sagecell_embed.css">
</head>
<body>

<h2>Example: Plot a function</h2>
<p>Try changing the function below and clicking Run.</p>
<div class="sage-cell"><script type="text/x-sage">
plot(sin(x), (x, -2*pi, 2*pi))
</script></div>

<h2>Example: Matrix operations</h2>
<div class="sage-cell"><script type="text/x-sage">
A = matrix([[1, 2], [3, 4]])
print(A.eigenvalues())
print(A.characteristic_polynomial())
</script></div>

</body>
</html>
